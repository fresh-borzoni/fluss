suite: sasl-existing-secret
templates:
  - templates/sts-coordinator.yaml
  - templates/sts-tablet.yaml
  - templates/configmap-jaas-template.yaml

tests:
  - it: renders init container and ConfigMap template when SASL is enabled
    set:
      security.internal.sasl.mechanism: plain
      security.internal.sasl.plain.username: u
      security.internal.sasl.plain.password: p
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: render-jaas-config
        template: templates/sts-coordinator.yaml
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: render-jaas-config
        template: templates/sts-tablet.yaml
      - containsDocument:
          kind: ConfigMap
          apiVersion: v1
        template: templates/configmap-jaas-template.yaml

  - it: does not render init container or ConfigMap when SASL is disabled
    set: {}
    asserts:
      - isNull:
          path: spec.template.spec.initContainers
        template: templates/sts-coordinator.yaml
      - hasDocuments:
          count: 0
        template: templates/configmap-jaas-template.yaml

  - it: template contains envsubst placeholders, not literal credentials
    set:
      security.internal.sasl.mechanism: plain
      security.internal.sasl.plain.username: leak-if-visible
      security.internal.sasl.plain.password: leak-if-visible-pass
    asserts:
      - matchRegex:
          path: data["jaas.conf"]
          pattern: 'user_\$\{FLUSS_JAAS_INTERNAL_USERNAME\}="\$\{FLUSS_JAAS_INTERNAL_PASSWORD\}"'
        template: templates/configmap-jaas-template.yaml
      - notMatchRegex:
          path: data["jaas.conf"]
          pattern: 'leak-if-visible'
        template: templates/configmap-jaas-template.yaml

  - it: literal internal credentials flow via env.value
    set:
      security.internal.sasl.mechanism: plain
      security.internal.sasl.plain.username: alice
      security.internal.sasl.plain.password: alice-pass
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: FLUSS_JAAS_INTERNAL_USERNAME
            value: alice
        template: templates/sts-coordinator.yaml
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: FLUSS_JAAS_INTERNAL_PASSWORD
            value: alice-pass
        template: templates/sts-coordinator.yaml

  - it: internal credentials from existingSecret flow via secretKeyRef
    set:
      security.internal.sasl.mechanism: plain
      security.internal.sasl.plain.existingSecret.name: fluss-internal-sasl
      security.internal.sasl.plain.existingSecret.usernameKey: u
      security.internal.sasl.plain.existingSecret.passwordKey: p
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: FLUSS_JAAS_INTERNAL_USERNAME
            valueFrom:
              secretKeyRef:
                name: fluss-internal-sasl
                key: u
        template: templates/sts-coordinator.yaml
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: FLUSS_JAAS_INTERNAL_PASSWORD
            valueFrom:
              secretKeyRef:
                name: fluss-internal-sasl
                key: p
        template: templates/sts-coordinator.yaml

  - it: internal existingSecret keys default to username/password
    set:
      security.internal.sasl.mechanism: plain
      security.internal.sasl.plain.existingSecret.name: fluss-internal-sasl
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: FLUSS_JAAS_INTERNAL_USERNAME
            valueFrom:
              secretKeyRef:
                name: fluss-internal-sasl
                key: username
        template: templates/sts-coordinator.yaml

  - it: zookeeper credentials from existingSecret
    set:
      security.zookeeper.sasl.mechanism: plain
      security.zookeeper.sasl.plain.existingSecret.name: fluss-zk-sasl
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: FLUSS_JAAS_ZOOKEEPER_USERNAME
            valueFrom:
              secretKeyRef:
                name: fluss-zk-sasl
                key: username
        template: templates/sts-tablet.yaml

  - it: client user with literal password uses env.value
    set:
      security.client.sasl.mechanism: plain
      security.client.sasl.plain.users:
        - username: alice
          password: alice-literal
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: FLUSS_JAAS_CLIENT_PASSWORD_0
            value: alice-literal
        template: templates/sts-coordinator.yaml

  - it: client user with passwordSecretRef uses secretKeyRef
    set:
      security.client.sasl.mechanism: plain
      security.client.sasl.plain.users:
        - username: bob
          passwordSecretRef:
            name: fluss-client-users
            key: bob-password
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: FLUSS_JAAS_CLIENT_PASSWORD_0
            valueFrom:
              secretKeyRef:
                name: fluss-client-users
                key: bob-password
        template: templates/sts-coordinator.yaml

  - it: ConfigMap template includes per-user placeholders
    set:
      security.client.sasl.mechanism: plain
      security.client.sasl.plain.users:
        - username: alice
          password: alice-pass
        - username: bob
          passwordSecretRef:
            name: s
            key: b
    asserts:
      - matchRegex:
          path: data["jaas.conf"]
          pattern: 'user_alice="\$\{FLUSS_JAAS_CLIENT_PASSWORD_0\}"'
        template: templates/configmap-jaas-template.yaml
      - matchRegex:
          path: data["jaas.conf"]
          pattern: 'user_bob="\$\{FLUSS_JAAS_CLIENT_PASSWORD_1\}";'
        template: templates/configmap-jaas-template.yaml

  - it: init container command runs envsubst
    set:
      security.internal.sasl.mechanism: plain
      security.internal.sasl.plain.username: u
      security.internal.sasl.plain.password: p
    asserts:
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: 'envsubst < /tmpl/jaas.conf > /jaas/jaas.conf'
        template: templates/sts-coordinator.yaml

  - it: init container mounts template ConfigMap read-only and writable emptyDir
    set:
      security.internal.sasl.mechanism: plain
      security.internal.sasl.plain.username: u
      security.internal.sasl.plain.password: p
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            name: sasl-template
            mountPath: /tmpl
            readOnly: true
        template: templates/sts-coordinator.yaml
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            name: sasl-config
            mountPath: /jaas
        template: templates/sts-coordinator.yaml
      - contains:
          path: spec.template.spec.volumes
          content:
            name: sasl-config
            emptyDir:
              medium: Memory
              sizeLimit: 1Mi
        template: templates/sts-coordinator.yaml

  - it: combines render-jaas-config init container with user-provided ones
    set:
      security.internal.sasl.mechanism: plain
      security.internal.sasl.plain.username: u
      security.internal.sasl.plain.password: p
      coordinator.initContainers:
        - name: wait-for-zk
          image: busybox
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: render-jaas-config
        template: templates/sts-coordinator.yaml
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: wait-for-zk
        template: templates/sts-coordinator.yaml
---
suite: sasl-existing-secret-validation
templates:
  - templates/NOTES.txt
tests:
  - it: fails when client user sets both password and passwordSecretRef
    set:
      security.client.sasl.mechanism: plain
      security.client.sasl.plain.users:
        - username: alice
          password: alice-literal
          passwordSecretRef:
            name: fluss-client-users
            key: alice-password
    asserts:
      - failedTemplate:
          errorMessage: "VALUES VALIDATION:\nsecurity.client.sasl.plain.users[0] cannot set both password and passwordSecretRef"

  - it: fails when client user sets passwordSecretRef with missing key
    set:
      security.client.sasl.mechanism: plain
      security.client.sasl.plain.users:
        - username: alice
          passwordSecretRef:
            name: fluss-client-users
    asserts:
      - failedTemplate:
          errorMessage: "VALUES VALIDATION:\nsecurity.client.sasl.plain.users[0].passwordSecretRef requires both name and key"

  - it: fails when client user has neither password nor passwordSecretRef
    set:
      security.client.sasl.mechanism: plain
      security.client.sasl.plain.users:
        - username: alice
    asserts:
      - failedTemplate:
          errorMessage: "VALUES VALIDATION:\nsecurity.client.sasl.plain.users[0] must set either password or passwordSecretRef"
